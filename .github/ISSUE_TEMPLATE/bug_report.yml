name: Bug report
description: Report a problem with VolC
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.7.1"
    validations:
      required: true
  - type: input
    id: xcode
    attributes:
      label: Xcode version
      placeholder: "16.4, 26.3, or not building from source"
    validations:
      required: false
  - type: dropdown
    id: app
    attributes:
      label: App involved
      options:
        - Spotify
        - Music
        - Google Chrome
        - Unsupported/read-only app
        - Menu bar/UI
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open VolC
        2. Play audio in ...
        3. Move slider ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include popover messages, screenshots, or whether Chrome JavaScript from Apple Events is enabled.
    validations:
      required: false

