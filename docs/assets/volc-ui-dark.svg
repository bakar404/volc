<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 868" role="img" aria-labelledby="title desc">
  <title id="title">VolC dark mode popover screenshot</title>
  <desc id="desc">A dark mode mock screenshot of the VolC macOS menu bar popover with master, Chrome, and Music volume rows.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#414432"/>
      <stop offset="45%" stop-color="#796d55"/>
      <stop offset="100%" stop-color="#22321e"/>
    </linearGradient>
    <linearGradient id="panelDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#352b21"/>
      <stop offset="100%" stop-color="#23291f"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1020"/>
      <stop offset="100%" stop-color="#171125"/>
    </linearGradient>
    <linearGradient id="volcBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42cbff"/>
      <stop offset="100%" stop-color="#0676ff"/>
    </linearGradient>
    <linearGradient id="volcPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6dff"/>
      <stop offset="100%" stop-color="#8b42ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4b6dff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="740" height="868" fill="url(#wallpaper)"/>
  <rect width="740" height="48" fill="#363a2f"/>
  <text x="357" y="32" fill="#eeeeea" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24">Speaker</text>
  <text x="427" y="33" fill="#eeeeea" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="27">Play</text>
  <text x="494" y="33" fill="#eeeeea" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="26">Display</text>
  <text x="565" y="33" fill="#eeeeea" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24">Volume</text>

  <path d="M343 72 L370 47 L397 72 Z" fill="#24251f" stroke="#636050"/>
  <rect x="4" y="72" width="736" height="796" rx="18" fill="url(#panelDark)" filter="url(#softShadow)"/>
  <rect x="5" y="73" width="734" height="794" rx="17" fill="none" stroke="#7f7968" stroke-opacity="0.55"/>

  <rect x="32" y="97" width="83" height="83" rx="13" fill="url(#logoBg)"/>
  <path d="M55 126 L77 165 L89 140" fill="none" stroke="url(#volcBlue)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlow)"/>
  <path d="M104 126 A24 24 0 1 0 104 157" fill="none" stroke="url(#volcPurple)" stroke-width="15" stroke-linecap="round" filter="url(#logoGlow)"/>

  <text x="139" y="133" fill="#f2f0e9" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="30" font-weight="700">VolC</text>
  <text x="139" y="166" fill="#d0c8bb" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">2 active apps</text>
  <rect x="644" y="122" width="68" height="32" rx="9" fill="#787b6c"/>
  <text x="657" y="145" fill="#f7f4ed" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Quit</text>

  <g transform="translate(24 199)">
    <rect width="696" height="79" rx="16" fill="#2c2a21" fill-opacity="0.78" stroke="#3b382c"/>
    <text x="23" y="51" fill="#d2cdc1" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="29">)))</text>
    <text x="84" y="49" fill="#f7f4ed" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="25" font-weight="700">Master</text>
    <rect x="200" y="35" width="376" height="7" rx="3.5" fill="#4a4941"/>
    <rect x="200" y="35" width="232" height="7" rx="3.5" fill="#1685f8"/>
    <circle cx="432" cy="39" r="20" fill="#9e9e9b" stroke="#b7b7b3" stroke-width="1"/>
    <text x="635" y="48" fill="#aaa9a1" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">63%</text>
  </g>

  <g transform="translate(24 298)">
    <rect width="696" height="88" rx="13" fill="#22221f" fill-opacity="0.95"/>
    <rect x="24" y="21" width="46" height="46" rx="10" fill="#ffffff"/>
    <circle cx="47" cy="44" r="18" fill="#f4c20d"/>
    <path d="M47 26 A18 18 0 0 1 65 44 L47 44 Z" fill="#3cba54"/>
    <path d="M29 44 A18 18 0 0 1 47 26 L47 44 Z" fill="#db4437"/>
    <path d="M65 44 A18 18 0 0 1 34 57 L47 44 Z" fill="#4285f4"/>
    <circle cx="47" cy="44" r="8" fill="#4285f4" stroke="#fff" stroke-width="3"/>
    <text x="94" y="54" fill="#f0eee8" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="25" font-weight="700">Google Chrome</text>
    <rect x="298" y="42" width="280" height="7" rx="3.5" fill="#454541"/>
    <rect x="298" y="42" width="87" height="7" rx="3.5" fill="#1685f8"/>
    <circle cx="388" cy="45" r="20" fill="#9b9b99"/>
    <text x="637" y="54" fill="#aaa9a1" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">29%</text>
  </g>

  <g transform="translate(24 397)">
    <rect width="696" height="88" rx="13" fill="#22221f" fill-opacity="0.95"/>
    <rect x="24" y="21" width="46" height="46" rx="10" fill="#ff3158"/>
    <text x="39" y="56" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="31" font-weight="800">♪</text>
    <text x="94" y="54" fill="#f0eee8" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="25" font-weight="700">Music</text>
    <rect x="298" y="42" width="280" height="7" rx="3.5" fill="#454541"/>
    <rect x="298" y="42" width="185" height="7" rx="3.5" fill="#1685f8"/>
    <circle cx="497" cy="45" r="20" fill="#9b9b99"/>
    <text x="637" y="54" fill="#aaa9a1" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">75%</text>
  </g>

  <text x="30" y="836" fill="#f1eee7" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="31">⏻</text>
  <text x="74" y="835" fill="#f1eee7" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Launch at login</text>
  <rect x="266" y="805" width="76" height="43" rx="21.5" fill="#0f78ef"/>
  <circle cx="321" cy="826.5" r="20" fill="#c3c3bd" stroke="#585852"/>
</svg>
