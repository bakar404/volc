<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">VolC dark mode logo</title>
  <desc id="desc">A dark square VolC logo with a blue V and violet C.</desc>
  <defs>
    <radialGradient id="backgroundGlow" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#151522"/>
      <stop offset="48%" stop-color="#0e0e16"/>
      <stop offset="100%" stop-color="#07080d"/>
    </radialGradient>
    <linearGradient id="vGradient" x1="250" y1="350" x2="590" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#47d0ff"/>
      <stop offset="55%" stop-color="#1594ff"/>
      <stop offset="100%" stop-color="#0472ff"/>
    </linearGradient>
    <linearGradient id="cGradient" x1="615" y1="330" x2="990" y2="865" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b67ff"/>
      <stop offset="52%" stop-color="#556dff"/>
      <stop offset="100%" stop-color="#8d45ff"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#126cff" flood-opacity="0.20"/>
    </filter>
    <filter id="cGlow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#7c45ff" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1254" height="1254" fill="url(#backgroundGlow)"/>
  <path
    d="M305 406 L500 810 L610 585"
    fill="none"
    stroke="url(#vGradient)"
    stroke-width="116"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#logoShadow)"
  />
  <path
    d="M968 412 A286 286 0 1 0 968 816"
    fill="none"
    stroke="url(#cGradient)"
    stroke-width="116"
    stroke-linecap="round"
    filter="url(#cGlow)"
  />
</svg>
